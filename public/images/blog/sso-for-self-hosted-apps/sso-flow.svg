<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="sso-title sso-desc">
  <title id="sso-title">SSO authentication flow</title>
  <desc id="sso-desc">A diagram showing the single sign-on flow: user authenticates through a reverse proxy which checks with an identity provider before granting access to backend services.</desc>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e" />
    </marker>
  </defs>

  <rect width="1200" height="640" fill="#0d1117" />

  <!-- Title -->
  <text x="40" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Single sign-on flow</text>
  <text x="40" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e">One login authenticates you across all self-hosted services</text>

  <!-- Step 1: User visits app -->
  <text x="80" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">Step 1 — User visits a protected app</text>

  <!-- User -->
  <rect x="80" y="150" width="200" height="70" rx="12" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <text x="180" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f0f6fc" text-anchor="middle">You</text>
  <text x="180" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Browser</text>

  <!-- Reverse proxy -->
  <rect x="370" y="150" width="210" height="70" rx="12" fill="#1a1f2e" stroke="#22c55e" stroke-width="2.5"/>
  <text x="475" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">Reverse Proxy</text>
  <text x="475" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Caddy + forward_auth</text>

  <!-- arrow 1: user → proxy -->
  <line x1="280" y1="185" x2="370" y2="185" stroke="#8b949e" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="325" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">GET /app</text>

  <!-- Step 2 label -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">Step 2 — Proxy checks authentication</text>

  <!-- IdP -->
  <rect x="370" y="280" width="210" height="70" rx="12" fill="#161b22" stroke="#f0f6fc" stroke-width="2.5"/>
  <text x="475" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc" text-anchor="middle">Identity Provider</text>
  <text x="475" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Pocket ID</text>

  <!-- arrow 2: proxy → IdP -->
  <line x1="475" y1="220" x2="475" y2="280" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="500" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#38bdf8">Check auth</text>

  <!-- Step 3 label -->
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">Step 3 — Not authenticated? Redirect to login</text>

  <!-- Login page -->
  <rect x="80" y="425" width="200" height="70" rx="12" fill="#161b22" stroke="#f0f6fc" stroke-width="2.5"/>
  <text x="180" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Login page</text>
  <text x="180" y="477" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">IdP-hosted</text>

  <!-- arrow 3: user redirected to login -->
  <line x1="180" y1="236" x2="120" y2="425" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGray)"/>
  <text x="90" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">Redirect to login</text>

  <!-- Step 4 label -->
  <text x="80" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">Step 4 — Authenticate once, access everything</text>

  <!-- Backend services -->
  <rect x="370" y="450" width="150" height="55" rx="10" fill="#161b22" stroke="#6366f1" stroke-width="2"/>
  <text x="445" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">Jellyfin</text>
  <text x="445" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Media</text>

  <rect x="545" y="450" width="150" height="55" rx="10" fill="#161b22" stroke="#6366f1" stroke-width="2"/>
  <text x="620" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">Grafana</text>
  <text x="620" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Dashboards</text>

  <rect x="720" y="450" width="150" height="55" rx="10" fill="#161b22" stroke="#6366f1" stroke-width="2"/>
  <text x="795" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">Nextcloud</text>
  <text x="795" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Files</text>

  <rect x="895" y="450" width="150" height="55" rx="10" fill="#161b22" stroke="#6366f1" stroke-width="2"/>
  <text x="970" y="474" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc" text-anchor="middle">n8n</text>
  <text x="970" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Automation</text>

  <!-- arrows from proxy to backends (post-auth) -->
  <line x1="475" y1="395" x2="445" y2="450" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="495" y1="390" x2="620" y2="450" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="510" y1="385" x2="795" y2="450" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="520" y1="380" x2="970" y2="450" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Success indicator -->
  <rect x="370" y="540" width="750" height="70" rx="10" fill="#1a1f2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="745" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">One identity. One login. Every app.</text>
  <text x="745" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">No per-app passwords. MFA enforced once. Revoke access in one place.</text>
</svg>
