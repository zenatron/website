<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="tm-title2 tm-desc2">
  <title id="tm-title2">Traffic metadata visibility</title>
  <desc id="tm-desc2">Comparison showing how metadata visibility shifts from ISP to VPN provider.</desc>

  <rect width="1200" height="600" fill="#0d1117" />

  <!-- Title -->
  <text x="40" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Who can see what?</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e">A VPN shifts metadata visibility from your ISP to the VPN provider</text>

  <!-- Without VPN (left column) -->
  <rect x="60" y="120" width="520" height="380" rx="16" fill="#1a1f2e" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ef4444" text-anchor="middle">Without VPN</text>

  <!-- ISP section header -->
  <rect x="90" y="185" width="460" height="36" rx="8" fill="#161b22"/>
  <text x="320" y="209" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc" text-anchor="middle">Your ISP</text>

  <!-- ISP items -->
  <circle cx="110" cy="245" r="5" fill="#ef4444"/>
  <text x="125" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Sees every website you visit (destinations)</text>

  <circle cx="110" cy="280" r="5" fill="#ef4444"/>
  <text x="125" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Sees timing and data volume</text>

  <circle cx="110" cy="315" r="5" fill="#ef4444"/>
  <text x="125" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Sees your real IP address</text>

  <circle cx="110" cy="350" r="5" fill="#ef4444"/>
  <text x="125" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Sees your DNS queries (unless DoH/DoT)</text>

  <!-- Website section header -->
  <rect x="90" y="385" width="460" height="36" rx="8" fill="#161b22"/>
  <text x="320" y="409" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc" text-anchor="middle">Websites</text>

  <circle cx="110" cy="440" r="5" fill="#ef4444"/>
  <text x="125" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">See your real IP</text>

  <circle cx="110" cy="470" r="5" fill="#ef4444"/>
  <text x="125" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Can track you across sites via IP + fingerprinting</text>

  <!-- With VPN (right column) -->
  <rect x="620" y="120" width="520" height="380" rx="16" fill="#1a1f2e" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#22c55e" text-anchor="middle">With VPN</text>

  <!-- ISP section -->
  <rect x="650" y="185" width="460" height="36" rx="8" fill="#161b22"/>
  <text x="880" y="209" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc" text-anchor="middle">Your ISP</text>

  <text x="670" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22c55e">X</text>
  <text x="688" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Only sees connection to VPN server</text>

  <text x="670" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22c55e">X</text>
  <text x="688" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Blind to your destinations</text>

  <text x="670" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22c55e">X</text>
  <text x="688" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Blind to your DNS queries</text>

  <!-- VPN provider section -->
  <rect x="650" y="345" width="460" height="36" rx="8" fill="#161b22"/>
  <text x="880" y="369" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc" text-anchor="middle">VPN Provider</text>

  <circle cx="670" cy="395" r="5" fill="#f59e0b"/>
  <text x="685" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Can see your destinations and traffic (same data as ISP)</text>

  <circle cx="670" cy="430" r="5" fill="#f59e0b"/>
  <text x="685" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f0f6fc">Can see your real IP</text>

  <!-- Website section -->
  <rect x="650" y="465" width="460" height="24" rx="6" fill="#161b22"/>
  <text x="880" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f0f6fc" text-anchor="middle">Websites see VPN server IP — not yours</text>

  <!-- Bottom note -->
  <rect x="60" y="520" width="1080" height="55" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Key trade-off: a VPN doesn't eliminate metadata exposure — it shifts who holds it.</text>
  <text x="600" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Trust no-logs VPNs with independent audits.</text>
</svg>
