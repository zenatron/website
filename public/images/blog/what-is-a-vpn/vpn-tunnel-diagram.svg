<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="vp-title vp-desc">
  <title id="vp-title">VPN tunnel diagram</title>
  <desc id="vp-desc">Side-by-side comparison: traffic without a VPN (ISP and websites see everything) vs with a VPN (encrypted tunnel, VPN IP visible to websites).</desc>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#0d1117" />

  <!-- Column headers -->
  <text x="300" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ef4444" text-anchor="middle">Without VPN</text>
  <text x="900" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#22c55e" text-anchor="middle">With VPN</text>

  <!-- Divider -->
  <line x1="600" y1="70" x2="600" y2="520" stroke="#21262d" stroke-width="2"/>

  <!-- === LEFT: Without VPN === -->

  <!-- Your device (left) -->
  <rect x="120" y="100" width="180" height="70" rx="12" fill="#161b22" stroke="#ef4444" stroke-width="2.5"/>
  <text x="210" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Your device</text>
  <text x="210" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">203.0.113.5</text>

  <!-- ISP (left) -->
  <rect x="120" y="230" width="180" height="70" rx="12" fill="#161b22" stroke="#ef4444" stroke-width="2.5"/>
  <text x="210" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Your ISP</text>
  <text x="210" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Sees everything</text>

  <!-- Website (left) -->
  <rect x="120" y="360" width="180" height="70" rx="12" fill="#161b22" stroke="#ef4444" stroke-width="2.5"/>
  <text x="210" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Website</text>
  <text x="210" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Sees real IP</text>

  <!-- Arrows left -->
  <line x1="210" y1="170" x2="210" y2="230" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="230" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ef4444">Visible traffic</text>

  <line x1="210" y1="300" x2="210" y2="360" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="230" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ef4444">Visible traffic</text>

  <!-- ISP visible metadata (left) -->
  <rect x="360" y="180" width="200" height="180" rx="12" fill="#1a1f2e" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="460" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">ISP can see</text>
  <circle cx="370" cy="235" r="3" fill="#ef4444"/>
  <text x="380" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Destinations</text>
  <circle cx="370" cy="260" r="3" fill="#ef4444"/>
  <text x="380" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Timing &amp; volume</text>
  <circle cx="370" cy="285" r="3" fill="#ef4444"/>
  <text x="380" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Your real IP</text>
  <circle cx="370" cy="310" r="3" fill="#ef4444"/>
  <text x="380" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">DNS queries</text>
  <circle cx="370" cy="335" r="3" fill="#ef4444"/>
  <text x="380" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">HTTPS SNI</text>

  <!-- === RIGHT: With VPN === -->

  <!-- Your device (right) -->
  <rect x="720" y="100" width="180" height="70" rx="12" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <text x="810" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Your device</text>
  <text x="810" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">203.0.113.5</text>

  <!-- VPN (right) -->
  <rect x="720" y="230" width="180" height="70" rx="12" fill="#161b22" stroke="#22c55e" stroke-width="2.5"/>
  <text x="810" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">VPN server</text>
  <text x="810" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">198.51.100.7</text>

  <!-- Website (right) -->
  <rect x="720" y="360" width="180" height="70" rx="12" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <text x="810" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc" text-anchor="middle">Website</text>
  <text x="810" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Sees VPN IP</text>

  <!-- Encrypted tunnel arrow -->
  <line x1="810" y1="170" x2="810" y2="230" stroke="#38bdf8" stroke-width="5" stroke-dasharray="10 6" marker-end="url(#arrowBlue)"/>
  <rect x="798" y="188" width="13" height="11" rx="2" fill="#38bdf8"/>
  <path d="M800 188 l4 -4 l4 4" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="850" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#38bdf8">Encrypted tunnel</text>

  <!-- Regular traffic from VPN to website -->
  <line x1="810" y1="300" x2="810" y2="360" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="850" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ef4444">Regular traffic</text>
  <text x="850" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">(VPN IP visible)</text>

  <!-- VPN provider visible (right) -->
  <rect x="360" y="420" width="200" height="130" rx="12" fill="#1a1f2e" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="460" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">VPN provider can see</text>
  <circle cx="370" cy="475" r="3" fill="#22c55e"/>
  <text x="380" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Destinations</text>
  <circle cx="370" cy="500" r="3" fill="#22c55e"/>
  <text x="380" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Timing &amp; volume</text>
  <circle cx="370" cy="525" r="3" fill="#22c55e"/>
  <text x="380" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Your real IP</text>

  <!-- Key insight -->
  <rect x="720" y="470" width="400" height="55" rx="10" fill="#1a1f2e" stroke="#6366f1" stroke-width="1"/>
  <text x="780" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f0f6fc">A VPN shifts trust from your ISP</text>
  <text x="780" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f0f6fc">to the VPN provider — choose carefully.</text>
</svg>
