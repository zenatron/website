<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="tm-title tm-desc">
  <title id="tm-title">Tailnet mesh diagram</title>
  <desc id="tm-desc">A mesh diagram showing devices connected through a tailnet with encrypted peer-to-peer links.</desc>

  <rect width="1200" height="600" fill="#0d1117" />

  <!-- Title -->
  <text x="40" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Tailnet mesh (simplified)</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e">Every device connects peer-to-peer through the encrypted WireGuard mesh</text>

  <!-- Center: Tailscale logo nod -->
  <circle cx="600" cy="300" r="55" fill="#1a1f2e" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="600" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">Tailscale</text>
  <text x="600" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">coordination</text>

  <!-- Laptop (top left) -->
  <rect x="120" y="130" width="180" height="100" rx="14" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="160" y="160" width="100" height="55" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="175" y1="215" x2="245" y2="215" stroke="#6366f1" stroke-width="1.5"/>
  <text x="210" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">Laptop</text>
  <text x="210" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100.1.2.3</text>

  <!-- Home Server (top center) -->
  <rect x="475" y="100" width="180" height="100" rx="14" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="520" y="140" width="90" height="50" rx="4" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="528" y="148" width="24" height="6" rx="1" fill="#6366f1"/>
  <rect x="528" y="158" width="24" height="6" rx="1" fill="#6366f1"/>
  <rect x="528" y="168" width="24" height="6" rx="1" fill="#6366f1"/>
  <circle cx="598" cy="170" r="12" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="598" cy="170" r="3" fill="#6366f1"/>
  <text x="565" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">Home server</text>
  <text x="565" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100.3.4.5</text>

  <!-- Phone (top right) -->
  <rect x="830" y="130" width="180" height="100" rx="14" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="895" y="155" width="50" height="68" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="908" y1="175" x2="932" y2="175" stroke="#6366f1" stroke-width="1.2"/>
  <circle cx="920" cy="208" r="3" fill="#6366f1"/>
  <text x="920" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">Phone</text>
  <text x="920" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100.5.6.7</text>

  <!-- Work PC (bottom left) -->
  <rect x="200" y="420" width="180" height="100" rx="14" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="240" y="450" width="100" height="55" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="255" y1="505" x2="325" y2="505" stroke="#6366f1" stroke-width="1.5"/>
  <text x="290" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">Work PC</text>
  <text x="290" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100.7.8.9</text>

  <!-- Tablet (bottom right) -->
  <rect x="650" y="420" width="180" height="100" rx="14" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="710" y="445" width="60" height="70" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="740" cy="490" r="3" fill="#6366f1"/>
  <text x="740" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">Tablet</text>
  <text x="740" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100.10.11.12</text>

  <!-- Peer-to-peer connections (direct links between devices) -->
  <!-- Laptop ↔ Server -->
  <line x1="330" y1="190" x2="475" y2="160" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
  <rect x="360" y="160" width="9" height="8" rx="1" fill="#22c55e"/>
  <path d="M361 160 l3 -3 l3 3" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Server ↔ Phone -->
  <line x1="655" y1="160" x2="830" y2="190" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Laptop ↔ Work PC -->
  <line x1="260" y1="230" x2="280" y2="420" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Server ↔ Work PC -->
  <line x1="520" y1="200" x2="380" y2="420" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Server ↔ Tablet -->
  <line x1="640" y1="180" x2="680" y2="420" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Phone ↔ Tablet -->
  <line x1="920" y1="230" x2="830" y2="420" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Legend -->
  <line x1="940" y1="560" x2="1000" y2="560" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="1010" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22c55e">Encrypted peer-to-peer WireGuard tunnels</text>
</svg>
