<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="cp-title cp-desc">
  <title id="cp-title">Control plane vs data plane</title>
  <desc id="cp-desc">Diagram showing Tailscale's control plane for coordination and direct data plane between devices.</desc>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#0d1117" />

  <!-- Title -->
  <text x="40" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Control plane vs data plane</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e">The control plane coordinates; the data plane carries encrypted traffic directly between devices</text>

  <!-- Laptop -->
  <rect x="60" y="150" width="280" height="140" rx="16" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="120" y="180" width="160" height="85" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="140" y1="265" x2="260" y2="265" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f0f6fc" text-anchor="middle">Laptop</text>

  <!-- Home Server -->
  <rect x="860" y="150" width="280" height="140" rx="16" fill="#161b22" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="920" y="175" width="160" height="85" rx="4" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="930" y="188" width="40" height="8" rx="1" fill="#6366f1"/>
  <rect x="930" y="202" width="40" height="8" rx="1" fill="#6366f1"/>
  <rect x="930" y="216" width="40" height="8" rx="1" fill="#6366f1"/>
  <circle cx="1050" cy="225" r="16" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="1050" cy="225" r="4" fill="#6366f1"/>
  <text x="1000" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f0f6fc" text-anchor="middle">Home server</text>

  <!-- Data plane (direct, thick solid line) -->
  <line x1="340" y1="220" x2="860" y2="220" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <rect x="560" y="205" width="12" height="12" rx="2" fill="#38bdf8"/>
  <path d="M562 205 l4 -4 l4 4" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="600" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#38bdf8" text-anchor="middle">Data plane (WireGuard, encrypted, direct)</text>

  <!-- Coordination server (below) -->
  <rect x="420" y="370" width="360" height="140" rx="16" fill="#1a1f2e" stroke="#22c55e" stroke-width="2"/>
  <rect x="480" y="400" width="240" height="85" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="540" cy="460" r="16" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="540" cy="460" r="4" fill="#22c55e"/>
  <circle cx="640" cy="460" r="16" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="640" cy="460" r="4" fill="#22c55e"/>
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#22c55e" text-anchor="middle">Coordination server</text>

  <!-- Control plane lines (dotted) -->
  <line x1="200" y1="290" x2="500" y2="370" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="320" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22c55e" font-weight="600">Control plane</text>

  <line x1="1000" y1="290" x2="700" y2="370" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="840" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22c55e" font-weight="600">Control plane</text>

  <!-- Legend -->
  <rect x="60" y="540" width="1080" height="60" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <line x1="100" y1="565" x2="160" y2="565" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="175" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22c55e">Control plane: coordination, key exchange, ACL distribution</text>

  <line x1="550" y1="565" x2="610" y2="565" stroke="#38bdf8" stroke-width="4"/>
  <text x="625" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#38bdf8">Data plane: direct peer-to-peer encrypted traffic</text>

  <rect x="1000" y="555" width="12" height="12" rx="2" fill="#38bdf8"/>
  <path d="M1002 555 l4 -4 l4 4" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="1020" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#38bdf8">End-to-end encrypted</text>
</svg>
