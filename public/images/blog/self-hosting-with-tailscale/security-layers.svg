<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="sl-title sl-desc">
  <title id="sl-title">Layered security for self-hosting</title>
  <desc id="sl-desc">Stacked layers showing identity, network, transport, and application protections in a defense-in-depth strategy.</desc>

  <rect width="1200" height="640" fill="#0d1117" />

  <!-- Title -->
  <text x="40" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Defense in depth</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e">Multiple security layers protect your services — no single layer is enough</text>

  <!-- Layer 1: Identity -->
  <rect x="80" y="120" width="1040" height="100" rx="14" fill="#1a1f2e" stroke="#6366f1" stroke-width="2.5"/>
  <text x="120" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6366f1">LAYER 1</text>
  <text x="230" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">Identity</text>
  <!-- Shield icon -->
  <path d="M940 155 l-20 10 l0 -10 l20 -10 l20 10 l0 10 z" fill="none" stroke="#6366f1" stroke-width="2"/>
  <rect x="930" y="140" width="12" height="25" rx="3" fill="#6366f1"/>
  <text x="230" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">SSO (Pocket ID) · Multi-factor authentication · Device trust · One identity for all apps</text>
  <text x="960" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6366f1" text-anchor="middle">Who are you?</text>

  <!-- Layer 2: Network -->
  <rect x="80" y="235" width="1040" height="100" rx="14" fill="#1a1f2e" stroke="#22c55e" stroke-width="2.5"/>
  <text x="120" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">LAYER 2</text>
  <text x="230" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">Network</text>
  <path d="M940 270 l-20 10 l0 -10 l20 -10 l20 10 l0 10 z" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="942" cy="252" r="4" fill="#22c55e"/>
  <text x="230" y="307" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">Tailscale mesh · Access control lists (ACLs) · Zero open ports · Tailnet lock</text>
  <text x="960" y="293" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">Can you get in?</text>

  <!-- Layer 3: Transport -->
  <rect x="80" y="350" width="1040" height="100" rx="14" fill="#1a1f2e" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="120" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#38bdf8">LAYER 3</text>
  <text x="230" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">Transport</text>
  <path d="M940 385 l-20 10 l0 -10 l20 -10 l20 10 l0 10 z" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <rect x="938" y="370" width="8" height="15" rx="1" fill="#38bdf8"/>
  <text x="230" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">TLS 1.3 · Modern ciphers (ChaCha20-Poly1305) · Automatic HTTPS via Caddy</text>
  <text x="960" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#38bdf8" text-anchor="middle">Is it encrypted?</text>

  <!-- Layer 4: Application -->
  <rect x="80" y="465" width="1040" height="100" rx="14" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="120" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">LAYER 4</text>
  <text x="230" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">Application</text>
  <path d="M940 500 l-20 10 l0 -10 l20 -10 l20 10 l0 10 z" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="936" y="490" width="12" height="18" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="537" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e">App-level auth · Role-based access · Regular updates · Watchtower auto-patching</text>
  <text x="960" y="523" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">What can you do?</text>

  <!-- Summary bar -->
  <rect x="80" y="580" width="1040" height="45" rx="10" fill="#161b22" stroke="#6366f1" stroke-width="1"/>
  <text x="600" y="608" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f0f6fc" text-anchor="middle">If any one layer fails, the others still protect you — that's defense in depth.</text>
</svg>
